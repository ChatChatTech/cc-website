<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行业研究 - 查特查特科技</title>
    <meta name="description" content="查特查特科技行业研究中心 - 数据要素、隐私计算、数据安全与人工智能领域的深度研究报告">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/research.css">
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header" id="header">
        <div class="container header-inner">
            <a href="index.html" class="logo">
                <span class="logo-icon">CC</span>
                <span class="logo-text">查特查特科技</span>
            </a>
            <nav class="nav" id="nav">
                <a href="index.html" class="nav-link">首页</a>
                <a href="index.html#products" class="nav-link">核心产品</a>
                <a href="index.html#components" class="nav-link">技术组件</a>
                <a href="index.html#advantages" class="nav-link">技术优势</a>
                <a href="research.html" class="nav-link active">行业研究</a>
                <a href="index.html#about" class="nav-link">关于我们</a>
            </nav>
            <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="菜单">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <!-- 研究报告头部 -->
    <section class="research-hero">
        <div class="container">
            <h1 class="research-hero-title">行业研究</h1>
            <p class="research-hero-desc">聚焦数据要素、隐私计算、数据安全与人工智能前沿领域，为产业发展提供深度洞察与决策参考</p>
            <div class="research-stats">
                <div class="research-stat">
                    <span class="research-stat-num" id="statTotal">50</span>
                    <span class="research-stat-label">研究报告</span>
                </div>
                <div class="research-stat">
                    <span class="research-stat-num">4</span>
                    <span class="research-stat-label">研究领域</span>
                </div>
                <div class="research-stat">
                    <span class="research-stat-num">2023-2026</span>
                    <span class="research-stat-label">时间跨度</span>
                </div>
            </div>
        </div>
    </section>

    <!-- 筛选栏 -->
    <section class="research-filters">
        <div class="container">
            <div class="filter-bar">
                <div class="filter-group">
                    <label class="filter-label">研究领域</label>
                    <div class="filter-tags" id="domainFilters">
                        <button class="filter-tag active" data-domain="all">全部</button>
                        <button class="filter-tag" data-domain="数据要素">数据要素</button>
                        <button class="filter-tag" data-domain="隐私计算">隐私计算</button>
                        <button class="filter-tag" data-domain="数据安全">数据安全</button>
                        <button class="filter-tag" data-domain="人工智能">人工智能</button>
                    </div>
                </div>
                <div class="filter-group">
                    <label class="filter-label">时间范围</label>
                    <div class="filter-tags" id="yearFilters">
                        <button class="filter-tag active" data-year="all">全部</button>
                        <button class="filter-tag" data-year="2023">2023</button>
                        <button class="filter-tag" data-year="2024">2024</button>
                        <button class="filter-tag" data-year="2025">2025</button>
                        <button class="filter-tag" data-year="2026">2026</button>
                    </div>
                </div>
                <div class="filter-group filter-search">
                    <input type="text" class="filter-input" id="searchInput" placeholder="搜索报告标题或关键词...">
                </div>
            </div>
            <div class="filter-result">
                <span id="resultCount">加载中...</span>
                <div class="view-toggle">
                    <button class="view-btn active" id="gridViewBtn" title="网格视图">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><rect x="1" y="1" width="7" height="7" rx="1"/><rect x="10" y="1" width="7" height="7" rx="1"/><rect x="1" y="10" width="7" height="7" rx="1"/><rect x="10" y="10" width="7" height="7" rx="1"/></svg>
                    </button>
                    <button class="view-btn" id="listViewBtn" title="列表视图">
                        <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><rect x="1" y="2" width="16" height="3" rx="1"/><rect x="1" y="7.5" width="16" height="3" rx="1"/><rect x="1" y="13" width="16" height="3" rx="1"/></svg>
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- 报告列表 -->
    <section class="research-list">
        <div class="container">
            <div class="articles-grid" id="articlesGrid">
                <!-- 动态填充 -->
            </div>
            <div class="articles-empty" id="articlesEmpty" style="display:none;">
                <p>未找到符合条件的研究报告</p>
            </div>
        </div>
    </section>

    <!-- Three.js 可视化 -->
    <section class="research-viz" id="researchViz">
        <div class="container">
            <h2 class="section-title">研究领域知识图谱</h2>
            <p class="section-desc">基于关键词关联的研究方向可视化分析</p>
            <div class="viz-container" id="vizContainer"></div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-inner">
                <div class="footer-brand">
                    <div class="logo">
                        <span class="logo-icon">CC</span>
                        <span class="logo-text">查特查特科技</span>
                    </div>
                    <p class="footer-desc">专注于隐私计算与数据安全领域的技术研究与产业赋能</p>
                </div>
                <div class="footer-links">
                    <a href="index.html">首页</a>
                    <a href="index.html#products">核心产品</a>
                    <a href="index.html#components">技术组件</a>
                    <a href="research.html">行业研究</a>
                    <a href="index.html#about">关于我们</a>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024-2026 Chatchat Technology 查特查特科技有限公司. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Three.js -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.min.js"></script>
    <script src="js/dotmatrix.js"></script>
    <script src="js/research.js"></script>
</body>
</html>
